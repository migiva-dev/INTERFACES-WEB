<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de precios con JSDoc</title>
</head>
<body>
    <h1>Calculadora de precios</h1>

    <p>
        Primera versión del proyecto. El objetivo principal es documentar
        funciones JavaScript usando comentarios JSDoc.
    </p>

    <form id="formulario-precios">
        <label for="precio">Precio unitario</label>
        <input type="number" id="precio" min="0" step="0.01" value="100">

        <br><br>

        <label for="cantidad">Cantidad</label>
        <input type="number" id="cantidad" min="1" step="1" value="2">

        <br><br>

        <label for="iva">IVA (%)</label>
        <input type="number" id="iva" min="0" step="0.01" value="21">

        <br><br>

        <label for="descuento">Descuento (%)</label>
        <input type="number" id="descuento" min="0" step="0.01" value="10">

        <br><br>

        <button type="submit">Calcular</button>
    </form>

    <h2>Resultado</h2>

    <p id="mensaje-error"></p>

    <p>Subtotal: <span id="resultado-subtotal">-</span></p>
    <p>Descuento: <span id="resultado-descuento">-</span></p>
    <p>IVA: <span id="resultado-iva">-</span></p>
    <p>Total final: <span id="resultado-total">-</span></p>

    <script src="js/precios.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
