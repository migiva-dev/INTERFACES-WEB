<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de registro con testing</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="contenedor">
    <section class="registro">
      <h1>Formulario de registro</h1>
      <p class="subtitulo">Con validación y resumen del registro</p>

      <form id="formRegistro" novalidate>
        <div class="grupo-campo">
          <label for="nombre">Nombre</label>
          <input type="text" id="nombre" name="nombre" placeholder="Introduce tu nombre">
          <p class="error-campo" id="errorNombre"></p>
        </div>

        <div class="grupo-campo">
          <label for="email">Correo electrónico</label>
          <input type="text" id="email" name="email" placeholder="ejemplo@correo.com">
          <p class="error-campo" id="errorEmail"></p>
        </div>

        <div class="grupo-campo">
          <label for="edad">Edad</label>
          <input type="text" id="edad" name="edad" placeholder="Introduce tu edad">
          <p class="error-campo" id="errorEdad"></p>
        </div>

        <div class="grupo-campo">
          <label for="password">Contraseña</label>
          <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres">
          <p class="error-campo" id="errorPassword"></p>
        </div>

        <div class="grupo-campo">
          <label for="repetirPassword">Repetir contraseña</label>
          <input type="password" id="repetirPassword" name="repetirPassword" placeholder="Repite la contraseña">
          <p class="error-campo" id="errorRepetirPassword"></p>
        </div>

        <div class="grupo-checkbox">
          <input type="checkbox" id="terminos" name="terminos">
          <label for="terminos">Acepto los términos y condiciones</label>
        </div>
        <p class="error-campo" id="errorTerminos"></p>

        <div class="botones">
          <button type="submit" id="btnEnviar">Registrarse</button>
          <button type="button" id="btnLimpiar">Limpiar</button>
        </div>
      </form>

      <div id="mensajeGeneral" class="mensaje-general"></div>

      <section class="resumen" id="resumen">
        <h2>Resumen del registro</h2>
        <p><strong>Nombre:</strong> <span id="resumenNombre">--</span></p>
        <p><strong>Email:</strong> <span id="resumenEmail">--</span></p>
        <p><strong>Edad:</strong> <span id="resumenEdad">--</span></p>
      </section>
    </section>
  </main>

  <script src="formularioRegistro.js"></script>
  <script src="script.js"></script>
</body>
</html>
