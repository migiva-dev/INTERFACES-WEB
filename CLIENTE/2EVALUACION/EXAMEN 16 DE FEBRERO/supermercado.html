<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Cola de Clientes - Supermercado</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; line-height: 1.4; margin: 20px; }
    form { display: grid; gap: 10px; max-width: 520px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    label { display: grid; gap: 6px; font-weight: 600; }
    input, select, button { padding: 10px; border-radius: 8px; border: 1px solid #ccc; }
    button { cursor: pointer; font-weight: 700; }
    .panel { margin-top: 14px; padding: 12px; border: 1px solid #ddd; border-radius: 10px; }
    .muted { color: #666; }
    ul { margin: 10px 0 0; padding-left: 18px; }
    li { margin: 6px 0; }
  </style>
</head>
<body>

<h2>Supermercado</h2>

<form id="formCliente" autocomplete="off">
  <div class="row">
    <label>
      Nombre
      <input id="inpNombre" type="text" required />
    </label>

    <label>
      Dinero (€)
      <input id="inpDinero" type="number" min="0" step="0.01" required />
    </label>
  </div>

  <div class="row">
    <label>
      Producto
      <select id="selProducto" required>
        <option value="Pan">Pan</option>
        <option value="Leche">Leche</option>
        <option value="Huevos">Huevos</option>
        <option value="Arroz">Arroz</option>
        <option value="Café">Café</option>
      </select>
    </label>

    <label>
      Cantidad
      <select id="selCantidad" required>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="5">5</option>
        <option value="10">10</option>
      </select>
    </label>
  </div>

  <div class="row">
    <button type="submit">Añadir a la cola</button>
    <button type="button" id="btnAtender">Atender</button>
  </div>
</form>

<div class="panel">
  <p><strong>Ingresos (cookie):</strong> <span id="ingresos">0.00</span> €</p>
  <p><strong>Salida:</strong> <span id="salida">(nada aún)</span></p>
  <p><strong>Cola:</strong> <span id="cola">(vacía)</span></p>
  <p><strong>Clientes (lista):</strong></p>
  <ul id="listaClientes"></ul>
</div>

<script>

class Cola {
  #items = [];

  enqueue(e) { this.#items.push(e); }
  dequeue() { return this.isEmpty() ? null : this.#items.shift(); }
  isEmpty() { return this.#items.length === 0; }
  size() { return this.#items.length; }
  toArray() { return this.#items.slice(); }

  mostrar() {
    if (this.isEmpty()) return "(vacía)";
    return this.#items.map(c => c.getNombre()).join(" → ");
  }
}

class Cliente {
  #nombre; #dinero; #producto; #cantidad;

  constructor(nombre, dinero, producto, cantidad) {
    this.setNombre(nombre);
    this.setDinero(dinero);
    this.setProducto(producto);
    this.setCantidad(cantidad);
  }

  getNombre(){ return this.#nombre; }
  getDinero(){ return this.#dinero; }
  getProducto(){ return this.#producto; }
  getCantidad(){ return this.#cantidad; }

  setNombre(nombre){ this.#nombre = nombre; }
  setDinero(dinero){ this.#dinero = dinero; }
  setProducto(producto){ this.#producto = producto; }
  setCantidad(cantidad){ this.#cantidad = cantidad; }

  resumen(){
    return `${this.#nombre} — ${Number(this.#dinero).toFixed(2)}€ — ${this.#cantidad} x ${this.#producto}`;
  }
}

function getCookie(nombre) {
  const cookies = document.cookie.split(";");
  for (let c of cookies) {
    c = c.trim();
    if (c.startsWith(nombre + "=")) {
      return decodeURIComponent(c.substring(nombre.length + 1));
    }
  }
  return null;
}

const cola = new Cola();

const form = document.getElementById("formCliente");
const salida = document.getElementById("salida");
const colaSpan = document.getElementById("cola");
const listaClientes = document.getElementById("listaClientes");
const ingresosSpan = document.getElementById("ingresos");

function renderIngresos(){
  const v = getCookie("ingresos");
  ingresosSpan.textContent = v ? Number(v).toFixed(2) : "0.00";
}

function render(){
  colaSpan.textContent = `${cola.mostrar()} (tamaño: ${cola.size()})`;
  listaClientes.innerHTML = "";

  cola.toArray().forEach((c,i)=>{
    const li = document.createElement("li");
    li.textContent = `${i+1}. ${c.resumen()}`;
    listaClientes.appendChild(li);
  });
}

form.addEventListener("submit",(e)=>{
  e.preventDefault();

  const nuevo = new Cliente(
    inpNombre.value.trim(),
    parseFloat(inpDinero.value),
    selProducto.value,
    parseInt(selCantidad.value)
  );

  cola.enqueue(nuevo);
  salida.textContent = `Añadido: ${nuevo.getNombre()}`;
  form.reset();
  render();
});

btnAtender.addEventListener("click", async ()=>{

  if (cola.isEmpty()){
    salida.textContent = "La cola está vacía";
    return;
  }

  const cliente = cola.dequeue();

  const resp = await fetch("supermercado.php",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      accion:"calcular_precio",
      item: cliente.getProducto(),
      cantidad: cliente.getCantidad()
    })
  });

  const data = await resp.json();

  if (data.error){
    salida.textContent = data.error;
    render();
    return;
  }

  const precio = Number(data.precio);
  const dinero = cliente.getDinero();

  if (dinero < precio){
    salida.textContent =
      `NO atendido: ${cliente.getNombre()} no tiene dinero suficiente`;
    render();
    return;
  }

  await fetch("supermercado.php",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      accion:"sumar_ingresos",
      importe: precio
    })
  });

  salida.textContent =
    `Atendido: ${cliente.getNombre()} paga ${precio.toFixed(2)}€`;

  renderIngresos();
  render();
});

renderIngresos();
render();

</script>

</body>
</html>
