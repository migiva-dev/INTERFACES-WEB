<!DOCTYPE html>
    <html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>1.3 Utilización de formularios desde código</title>

        <style>
        body { font-family: Arial; padding: 30px; }
        label { display:block; margin-top:10px; }
        #info { margin-top:20px; padding:10px; background:#f0f0f0; }
        .email { background-color: #51565e; }
        </style>

    </head>

    <body>

        <h2>Formulario de una banda</h2>
        
        <div class="card" id="card1">
    <fieldset>
      <legend>Miembro 1</legend>

      <form id="f1" name="miembro1">
        <label>
          Nombre:
          <input type="text" name="nombre" />
        </label>

        <label>
          Apellido:
          <input type="text" name="apellido" />
        </label>

        <label>
          Edad:
          <input type="number" name="edad" min="1" />
        </label>

        <label>
          Posición:
          <select name="posicion">
            <option value="">-- Elige --</option>
            <option value="vocalista">Vocalista</option>
            <option value="musico">Músico</option>
          </select>
        </label>

        <label>
            Instrumeto: 
            <select name="instrumeto">
                <option value="">-- Elige --</option>
                 <option value="guitarrra">Guitarra</option>
                 <option value="bateria">Batería</option>
                 <option value="Bajo">Bajo</option>
            </select>
        </label>







    </body>

    

</html>
