<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Formulario Desarrollador</title>
<style>
  body { font-family: Arial; padding:20px; }
  label { display:block; margin-top:10px; }
</style>
</head>

<body>

<h2>Formulario Desarrollador</h2>

<!-- ========================= -->
<!-- FORMULARIO 1:-->
<!-- ========================= -->

<form id="formPersonal">
  <h3>Datos personales</h3>

  <label>
    Nombre:
    <input type="text" id="nombre" maxlength="50" required>
  </label>

  <label>
    Apellidos:
    <input type="text" id="apellidos" maxlength="100" required>
  </label>

  <label>
    Email:
    <input type="email" id="email" maxlength="150" required>
  </label>

  <label>
    Teléfono:
    <input type="text" id="telefono" maxlength="15">
  </label>

  <label>
    DNI/NIE:
    <input type="text" id="documento" maxlength="12">
  </label>

  <label>
    Dirección:
    <input type="text" id="direccion" maxlength="150">
  </label>
  
  <br>

  <button type="button" id="btnPersonal">Guardar personales</button>
  <br>
</form>


<hr>

<!-- ======================== -->
<!-- FORMULARIO 2:-->
<!-- ======================== -->

<form id="formLaboral">
  <h3>Datos laborales</h3>

  <label>
    Fecha alta:
    <input type="date" id="fecha_alta" required>
  </label>

  <label>
    <input type="checkbox" id="activo">
    Activo
  </label>

  <div id="divEstudio" style="display:none;">
    <label>
      Estudio:
      <select id="id_estudio">
        <option value="">Sin estudio</option>
        <option value="1">FP DAM</option>
        <option value="2">FP DAW</option>
        <option value="3">Grado Informática</option>
      </select>
    </label>
  </div>

  <br>

  <button type="button" id="btnLaboral">Guardar laborales</button>
</form>

<hr>

<button type="button" id="btnMostrar">Mostrar valores</button>

<div id="resultado"></div>

<script>

// Mostrar/ocultar estudio según activo
const chkActivo = document.getElementById("activo");
const divEstudio = document.getElementById("divEstudio");

chkActivo.addEventListener("change", function() {
  divEstudio.style.display = this.checked ? "block" : "none";
});

// Limpieza de caracteres permitidos
function limpiarTexto(texto) {
  return texto.replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ' -]/g, "").trim();
}

function limpiarTelefono(texto) {
  return texto.replace(/[^0-9+() -]/g, "").trim();
}

function limpiarAlfanumerico(texto) {
  return texto.replace(/[^A-Za-z0-9-]/g, "").trim();
}

function limpiarDireccion(texto) {
  return texto.replace(/[<>]/g, "").trim();
}

// Recoger datos personales
function getPersonal() {
  return {
    nombre: limpiarTexto(document.getElementById("nombre").value),
    apellidos: limpiarTexto(document.getElementById("apellidos").value),
    email: document.getElementById("email").value.trim(),
    telefono: limpiarTelefono(document.getElementById("telefono").value),
    documento: limpiarAlfanumerico(document.getElementById("documento").value),
    direccion: limpiarDireccion(document.getElementById("direccion").value)
  };
}

// Recoger datos laborales
function getLaboral() {
  const activo = chkActivo.checked;
  let id_estudio = null;

  if (activo) {
    const valor = document.getElementById("id_estudio").value;
    id_estudio = valor === "" ? null : parseInt(valor);
  }

  return {
    fecha_alta: document.getElementById("fecha_alta").value,
    activo: activo,
    id_estudio: id_estudio
  };
}

// Mostrar valores
document.getElementById("btnMostrar").addEventListener("click", function() {

  const personal = getPersonal();
  const laboral = getLaboral();

  document.getElementById("resultado").innerHTML = `
    <strong>PERSONALES</strong><br>
    Nombre: ${personal.nombre}<br>
    Apellidos: ${personal.apellidos}<br>
    Email: ${personal.email}<br>
    Teléfono: ${personal.telefono}<br>
    Documento: ${personal.documento}<br>
    Dirección: ${personal.direccion}<br><br>

    <strong>LABORALES</strong><br>
    Fecha alta: ${laboral.fecha_alta}<br>
    Activo: ${laboral.activo ? "Sí" : "No"}<br>
    Id estudio: ${laboral.id_estudio === null ? "NULL" : laboral.id_estudio}
  `;
});

</script>

</body>
</html>
