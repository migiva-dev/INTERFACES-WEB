<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Desarrollador - Alta / Edición</title>

  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    label { display: block; margin-top: 12px; }
    fieldset { margin-top: 16px; padding: 12px; }
    .error { border: 2px solid red; background: #ffecec; }
    .msg-error { color: #b00020; margin: 6px 0 0; font-size: 13px; }
    #resumen { margin-top: 16px; padding: 12px; background: #f2f2f2; border: 1px solid #ccc; }
    input, select, textarea { width: 100%; box-sizing: border-box; }
  </style>
</head>

<body>
  <h2>Formulario de Desarrollador</h2>

  <!-- =========================
       FORM 1: DATOS PERSONALES
       ========================= -->
  <form id="formPersonal" novalidate>
    <fieldset>
      <legend><strong>Información personal</strong></legend>

      <label for="nombre">Nombre *</label>
      <input id="nombre" name="nombre" type="text" maxlength="50" autocomplete="given-name" />

      <label for="apellidos">Apellidos *</label>
      <input id="apellidos" name="apellidos" type="text" maxlength="100" autocomplete="family-name" />

      <label for="dni">DNI/NIE</label>
      <input id="dni" name="dni" type="text" maxlength="15" />

      <label for="email">Email *</label>
      <input id="email" name="email" type="email" maxlength="120" autocomplete="email" />

      <label for="telefono">Teléfono</label>
      <input id="telefono" name="telefono" type="tel" maxlength="20" autocomplete="tel" />

      <label for="fecha_nacimiento">Fecha de nacimiento</label>
      <input id="fecha_nacimiento" name="fecha_nacimiento" type="date" />

      <label for="direccion">Dirección</label>
      <input id="direccion" name="direccion" type="text" maxlength="200" autocomplete="street-address" />

      <label for="cp">Código postal</label>
      <input id="cp" name="cp" type="text" maxlength="10" autocomplete="postal-code" />

      <label for="ciudad">Ciudad</label>
      <input id="ciudad" name="ciudad" type="text" maxlength="80" autocomplete="address-level2" />

      <label for="provincia">Provincia</label>
      <input id="provincia" name="provincia" type="text" maxlength="80" autocomplete="address-level1" />

      <label for="pais">País</label>
      <input id="pais" name="pais" type="text" maxlength="80" autocomplete="country-name" value="España" />

      <label for="observaciones">Observaciones</label>
      <textarea id="observaciones" name="observaciones" maxlength="500"></textarea>

      <div style="margin-top: 12px;">
        <button type="submit">Validar personal</button>
        <button type="reset">Limpiar</button>
      </div>
    </fieldset>
  </form>

  <!-- =========================
    FORM 2: DATOS LABORALES
  ========================= -->
  <form id="formLaboral" novalidate>
    <fieldset>
      <legend><strong> Datos laborales</strong></legend>

      <label for="fecha_alta">Fecha de alta *</label>
      <input id="fecha_alta" name="fecha_alta" type="date" />

      <label style="display:block; margin-top:12px;">Activo</label>
      <div>
        <input id="activo" name="activo" type="checkbox" />
        <label for="activo" style="display:inline; margin-top:0;">Sí</label>
      </div>

      <div id="wrapEstudio" class="hidden" style="margin-top: 12px;">
        <label for="id_estudio">Estudio (solo si Activo)</label>
        <select id="id_estudio" name="id_estudio"></select>
        <div style="font-size: 13px; margin-top: 6px;">
          “Sin estudio” enviará <code>null</code> a la base de datos.
        </div>
      </div>

        <div style="margin-top: 12px;">
          <button type="submit">Guardar (personal + laboral)</button>
          <button type="reset">Limpiar</button>
        </div>
      </fieldset>
    </form>

    <div id="resumen"></div>

  </body>
</html>
