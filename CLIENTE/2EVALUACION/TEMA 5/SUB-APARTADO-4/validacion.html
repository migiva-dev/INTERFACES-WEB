<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Validación de formulario</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    label { display: block; margin-top: 12px; }
    fieldset { margin-top: 16px; padding: 12px; }
    .error { border: 2px solid red; background: #ffecec; }
    .msg-error { color: #b00020; margin: 6px 0 0; font-size: 13px; }
    #resumen { margin-top: 16px; padding: 12px; background: #f2f2f2; border: 1px solid #ccc; }

    /* opcional, no cambia el look, solo evita desbordes */
    input, select, textarea { width: 100%; box-sizing: border-box; }
  </style>
</head>

<body>
  <h2>Formulario de desarrollador</h2>

  <!-- =========================
       FORM 1: PERSONAL
       ========================= -->
  <form id="formPersonal" novalidate>
    <fieldset>
      <legend>Información personal</legend>

      <label for="nombre">Nombre</label>
      <input type="text" id="nombre" name="nombre" maxlength="80">

      <label for="apellido">Apellido </label>
      <input type="text" id="apellido" name="apellido" maxlength="120">

      <label for="email">Email </label>
      <input type="text" id="email" name="email" maxlength="150">

      <label for="ciudad">Ciudad </label>
      <input type="text" id="ciudad" name="ciudad" maxlength="80">

      <label for="pais">País </label>
      <input type="text" id="pais" name="pais" maxlength="80" value="España">

      <label for="fecha_nacimiento">Fecha de nacimiento </label>
      <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">

      <button type="submit" style="margin-top:12px;">Validar personal</button>
      <button type="reset">Limpiar</button>
    </fieldset>
  </form>

  <!-- =========================
       FORM 2: LABORAL
       ========================= -->
  <form id="formLaboral" novalidate>
    <fieldset>
      <legend>Datos laborales</legend>

      <label for="fecha_alta">Fecha de alta</label>
      <input type="date" id="fecha_alta" name="fecha_alta">

      <div style="margin-top:12px;">
        <input type="checkbox" id="activo" name="activo">
        <label for="activo" style="display:inline; margin-top:0;">Activo</label>
      </div>

      <div id="wrapEstudio" style="display:none; margin-top:12px;">
        <label for="id_estudio">Estudio (obligatorio si Activo)</label>
        <select id="id_estudio" name="id_estudio"></select>
      </div>

      <button type="submit" style="margin-top:12px;">Guardar</button>
      <button type="reset">Limpiar</button>
    </fieldset>
  </form>

  <div id="resumen"></div>

  <script>
    const formPersonal = document.getElementById("formPersonal");
    const formLaboral = document.getElementById("formLaboral");
    const resumen = document.getElementById("resumen");

    // Campos personal
    const nombre = document.getElementById("nombre");
    const apellido = document.getElementById("apellido");
    const email = document.getElementById("email");
    const ciudad = document.getElementById("ciudad");
    const pais = document.getElementById("pais");
    const fechaNacimiento = document.getElementById("fecha_nacimiento");

    // Campos laboral
    const fechaAlta = document.getElementById("fecha_alta");
    const activo = document.getElementById("activo");
    const wrapEstudio = document.getElementById("wrapEstudio");
    const selectEstudio = document.getElementById("id_estudio");

    // ======= utilidades errores (igual estilo ejemplo) =======
    function limpiarErrores(form) {
      form.querySelectorAll(".error").forEach(function (el) {
        el.classList.remove("error");
      });
      form.querySelectorAll(".msg-error").forEach(function (el) {
        el.remove();
      });
    }

    function ponerError(elemento, mensaje) {
      limpiarErrorDeCampo(elemento);
      elemento.classList.add("error");
      const p = document.createElement("p");
      p.className = "msg-error";
      p.textContent = mensaje;
      elemento.insertAdjacentElement("afterend", p);
    }

    function limpiarErrorDeCampo(elemento) {
      elemento.classList.remove("error");
      const siguiente = elemento.nextElementSibling;
      if (siguiente && siguiente.classList.contains("msg-error")) {
        siguiente.remove();
      }
    }

    function ponerErrorBloque(bloque, mensaje) {
      limpiarErrorDeBloque(bloque);
      bloque.classList.add("error");
      const p = document.createElement("p");
      p.className = "msg-error";
      p.textContent = mensaje;
      bloque.appendChild(p);
    }

    function limpiarErrorDeBloque(bloque) {
      bloque.classList.remove("error");
      bloque.querySelectorAll(".msg-error").forEach(function (m) {
        m.remove();
      });
    }

    // ======= sanitizado + maxlength =======
    function clampMaxLen(str, maxLen) {
      if (typeof str !== "string") return "";
      if (!maxLen || maxLen <= 0) return str;
      return str.length > maxLen ? str.slice(0, maxLen) : str;
    }

    function sanitizeNombreLike(s) {
      return s.replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ\s'\-]/g, "");
    }
    function sanitizeEmail(s) {
      return s.replace(/\s+/g, "");
    }

    function bindSanitizer(el, sanitizerFn) {
      el.addEventListener("input", function () {
        limpiarErrorDeCampo(el);
        const max = el.maxLength;
        const cleaned = clampMaxLen(sanitizerFn(el.value), max);
        if (el.value !== cleaned) el.value = cleaned;
      });
    }

    bindSanitizer(nombre, sanitizeNombreLike);
    bindSanitizer(apellido, sanitizeNombreLike);
    bindSanitizer(ciudad, sanitizeNombreLike);
    bindSanitizer(pais, sanitizeNombreLike);
    bindSanitizer(email, sanitizeEmail);

    // ======= cargar estudios desde validacion.php =======
    async function cargarEstudios() {
      try {
        const resp = await fetch("validacion.php?action=estudios");
        const out = await resp.json();
        if (!out.ok) throw new Error(out.message || "No se pudieron cargar los estudios.");

        selectEstudio.innerHTML = "";

        const optNull = document.createElement("option");
        optNull.value = "";
        optNull.textContent = "Sin estudio";
        selectEstudio.appendChild(optNull);

        out.data.forEach(function (e) {
          const opt = document.createElement("option");
          opt.value = String(e.id);
          opt.textContent = e.nombre;
          selectEstudio.appendChild(opt);
        });
      } catch (err) {
        selectEstudio.innerHTML = "<option value=''>Sin estudio</option>";
        resumen.innerHTML = "<strong>Error</strong><br>No se pudieron cargar los estudios.";
      }
    }
    cargarEstudios();

    // ======= mostrar/ocultar id_estudio =======
    function refreshEstudioVisibility() {
      if (activo.checked) {
        wrapEstudio.style.display = "block";
      } else {
        wrapEstudio.style.display = "none";
        selectEstudio.value = "";
        limpiarErrorDeCampo(selectEstudio);
        limpiarErrorDeBloque(wrapEstudio);
      }
    }

    activo.addEventListener("change", function () {
      refreshEstudioVisibility();
      limpiarErrorDeCampo(fechaAlta);
    });
    refreshEstudioVisibility();

    // ======= fechas: hoy sin hora =======
    function todayYMD() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return y + "-" + m + "-" + day;
    }

    function isFutureDate(ymd) {
      if (!ymd) return false;
      return ymd > todayYMD();
    }

    // ======= validación PERSONAL =======
    function validatePersonal() {
      limpiarErrores(formPersonal);

      let ok = true;
      let primerError = null;

      const n = nombre.value.trim();
      const a = apellido.value.trim();
      const em = email.value.trim();
      const c = ciudad.value.trim();
      const p = pais.value.trim();
      const fn = fechaNacimiento.value;

      if (n === "" || n.length < 2) {
        ponerError(nombre, "El nombre es obligatorio y debe tener al menos 2 caracteres.");
        if (!primerError) primerError = nombre;
        ok = false;
      }

      if (a === "" || a.length < 2) {
        ponerError(apellido, "El apellido es obligatorio y debe tener al menos 2 caracteres.");
        if (!primerError) primerError = apellido;
        ok = false;
      }

      if (em !== "" && em.indexOf("@") === -1) {
        ponerError(email, "El email debe contener @.");
        if (!primerError) primerError = email;
        ok = false;
      }

      if (c !== "" && c.length < 2) {
        ponerError(ciudad, "La ciudad debe tener al menos 2 caracteres si está rellena.");
        if (!primerError) primerError = ciudad;
        ok = false;
      }

      if (p !== "" && p.length < 2) {
        ponerError(pais, "El país debe tener al menos 2 caracteres si está relleno.");
        if (!primerError) primerError = pais;
        ok = false;
      }

      if (fn && isFutureDate(fn)) {
        ponerError(fechaNacimiento, "La fecha de nacimiento no puede ser futura.");
        if (!primerError) primerError = fechaNacimiento;
        ok = false;
      }

      if (!ok && primerError) primerError.focus();
      return ok;
    }

    // ======= validación LABORAL (depende de activo) =======
    function validateLaboral() {
      limpiarErrores(formLaboral);

      let ok = true;
      let primerError = null;

      const fa = fechaAlta.value;
      const isAct = activo.checked;

      if (isAct) {
        if (fa === "") {
          ponerError(fechaAlta, "La fecha de alta es obligatoria si Activo está marcado.");
          if (!primerError) primerError = fechaAlta;
          ok = false;
        } else if (isFutureDate(fa)) {
          ponerError(fechaAlta, "La fecha de alta no puede ser futura.");
          if (!primerError) primerError = fechaAlta;
          ok = false;
        }

        if (selectEstudio.value === "") {
          ponerError(selectEstudio, "Debes seleccionar un estudio (no puede ser “Sin estudio”).");
          if (!primerError) primerError = selectEstudio;
          ok = false;
        }
      } else {
        if (fa !== "" && isFutureDate(fa)) {
          ponerError(fechaAlta, "La fecha de alta no puede ser futura.");
          if (!primerError) primerError = fechaAlta;
          ok = false;
        }
      }

      if (!ok && primerError) {
        if (primerError === selectEstudio && wrapEstudio.style.display === "none") {
          wrapEstudio.style.display = "block";
        }
        primerError.focus();
      }
      return ok;
    }

    // ======= construir payload =======
    function getPersonalData() {
      const data = {
        nombre: nombre.value.trim(),
        apellido: apellido.value.trim(),
        email: email.value.trim(),
        ciudad: ciudad.value.trim(),
        pais: pais.value.trim(),
        fecha_nacimiento: fechaNacimiento.value || null
      };
      Object.keys(data).forEach(function (k) {
        if (data[k] === "") data[k] = null;
      });
      return data;
    }

    function getLaboralData() {
      const isAct = activo.checked;

      let id_estudio = null;
      if (isAct) {
        id_estudio = (selectEstudio.value === "") ? null : Number(selectEstudio.value);
      } else {
        id_estudio = null;
      }

      return {
        fecha_alta: fechaAlta.value || null,
        activo: isAct,
        id_estudio: id_estudio
      };
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ======= limpiar error al corregir =======
    [nombre, apellido, email, ciudad, pais].forEach(function (el) {
      el.addEventListener("input", function () { limpiarErrorDeCampo(el); });
    });
    fechaNacimiento.addEventListener("change", function () { limpiarErrorDeCampo(fechaNacimiento); });

    fechaAlta.addEventListener("change", function () { limpiarErrorDeCampo(fechaAlta); });
    selectEstudio.addEventListener("change", function () { limpiarErrorDeCampo(selectEstudio); });

    // ======= SUBMITS =======
    formPersonal.addEventListener("submit", function (e) {
      e.preventDefault();
      resumen.innerHTML = "";

      const ok = validatePersonal();
      if (ok) {
        const data = getPersonalData();
        resumen.innerHTML =
          "<strong>Personal válido</strong><br>" +
          "<pre>" + escapeHtml(JSON.stringify(data, null, 2)) + "</pre>";
      }
    });

    // ✅ Guardar: POST al servidor
    formLaboral.addEventListener("submit", async function (e) {
      e.preventDefault();
      resumen.innerHTML = "";

      const okP = validatePersonal();
      const okL = validateLaboral();
      if (!okP || !okL) return;

      const payload = Object.assign({}, getPersonalData(), getLaboralData());

      try {
        const resp = await fetch("validacion.php", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const out = await resp.json();

        if (!out.ok) {
          if (out.errors) {
            // Pinta errores del servidor en los campos correspondientes
            Object.keys(out.errors).forEach(function (field) {
              const msg = out.errors[field];

              if (field === "nombre") ponerError(nombre, msg);
              else if (field === "apellido") ponerError(apellido, msg);
              else if (field === "email") ponerError(email, msg);
              else if (field === "ciudad") ponerError(ciudad, msg);
              else if (field === "pais") ponerError(pais, msg);
              else if (field === "fecha_nacimiento") ponerError(fechaNacimiento, msg);
              else if (field === "fecha_alta") ponerError(fechaAlta, msg);
              else if (field === "id_estudio") {
                wrapEstudio.style.display = "block";
                ponerError(selectEstudio, msg);
              }
            });

            // foco al primer error
            const orden = [nombre, apellido, email, ciudad, pais, fechaNacimiento, fechaAlta, selectEstudio];
            for (let i = 0; i < orden.length; i++) {
              if (orden[i].classList.contains("error")) {
                orden[i].focus();
                break;
              }
            }
          } else {
            resumen.innerHTML = "<strong>Error</strong><br>" + (out.message || "Error desconocido.");
          }
          return;
        }

        // OK
        resumen.innerHTML =
          "<strong>Guardado OK (servidor)</strong><br>" +
          "<pre>" + escapeHtml(JSON.stringify(out, null, 2)) + "</pre>";

      } catch (err) {
        resumen.innerHTML = "<strong>Error</strong><br>No se pudo conectar con el servidor.";
      }
    });

    // ======= RESET + FOCO =======
    formPersonal.addEventListener("reset", function () {
      setTimeout(function () {
        limpiarErrores(formPersonal);
        resumen.innerHTML = "";
        nombre.focus();
      }, 0);
    });

    formLaboral.addEventListener("reset", function () {
      setTimeout(function () {
        limpiarErrores(formLaboral);
        resumen.innerHTML = "";
        activo.checked = false;
        refreshEstudioVisibility();
        fechaAlta.value = "";
        nombre.focus();
      }, 0);
    });

    // foco inicial
    window.addEventListener("load", function () {
      nombre.focus();
    });
  </script>
</body>
</html>
