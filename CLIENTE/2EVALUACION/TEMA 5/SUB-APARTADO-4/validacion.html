<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Validación de formulario</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; }
    label { display: block; margin-top: 12px; }
    fieldset { margin-top: 16px; padding: 12px; }
    .error { border: 2px solid red; background: #ffecec; }
    .msg-error { color: #b00020; margin: 6px 0 0; font-size: 13px; }
    #resumen { margin-top: 16px; padding: 12px; background: #f2f2f2; border: 1px solid #ccc; }
  </style>
</head>

<body>
  <h2>Formulario de desarrollador </h2>

  <!-- =========================
       FORMULARIO: PERSONAL
       ========================= -->
  <form id="formPersonal" novalidate>
    <fieldset>
      <legend>Información personal</legend>

      <label for="nombre">Nombre (obligatorio)</label>
      <input type="text" id="nombre" name="nombre" maxlength="80">

      <label for="apellido">Apellido (obligatorio)</label>
      <input type="text" id="apellido" name="apellido" maxlength="120">

      <label for="email">Email (opcional)</label>
      <input type="email" id="email" name="email" maxlength="150">

      <label for="ciudad">Ciudad (opcional)</label>
      <input type="text" id="ciudad" name="ciudad" maxlength="80">

      <label for="pais">País (opcional)</label>
      <input type="text" id="pais" name="pais" maxlength="80" value="España">

      <label for="fecha_nacimiento">Fecha de nacimiento (opcional)</label>
      <input type="date" id="fecha_nacimiento" name="fecha_nacimiento">

      <button type="submit" style="margin-top:12px;">Validar personal</button>
      <button type="reset">Limpiar</button>
    </fieldset>
  </form>

  <!-- =========================
       FORMULARIO 2: LABORAL
       ========================= -->
  <form id="formLaboral" novalidate>
    <fieldset>
      <legend>Datos laborales</legend>

      <label for="fecha_alta">Fecha de alta (obligatoria)</label>
      <input type="date" id="fecha_alta" name="fecha_alta">

      <div style="margin-top:12px;">
        <input type="checkbox" id="activo" name="activo">
        <label for="activo" style="display:inline; margin-top:0;">Activo</label>
      </div>

      <!-- id_estudio SOLO si Activo -->
      <div id="wrapEstudio" style="display:none; margin-top:12px;">
        <label for="id_estudio">Estudio (solo si Activo)</label>
        <select id="id_estudio" name="id_estudio"></select>
        <div style="margin-top:6px; font-size:13px;">
          “Sin estudio” enviará <code>null</code> a la base de datos.
        </div>
      </div>

      <button type="submit" style="margin-top:12px;">Guardar (personal + laboral)</button>
      <button type="reset">Limpiar</button>
    </fieldset>
  </form>

  <div id="resumen"></div>

  <script>
    const formPersonal = document.getElementById("formPersonal");
    const formLaboral = document.getElementById("formLaboral");
    const resumen = document.getElementById("resumen");

    // Campos
    const nombre = document.getElementById("nombre");
    const apellido = document.getElementById("apellido");
    const email = document.getElementById("email");
    const ciudad = document.getElementById("ciudad");
    const pais = document.getElementById("pais");
    const fechaNacimiento = document.getElementById("fecha_nacimiento");

    const fechaAlta = document.getElementById("fecha_alta");
    const activo = document.getElementById("activo");
    const wrapEstudio = document.getElementById("wrapEstudio");
    const selectEstudio = document.getElementById("id_estudio");

    // Estudios actuales (en producción vendrían de tu API)
    const estudiosActuales = [
      { id: 1, nombre: "Larian Studios" },
      { id: 2, nombre: "FromSoftware" },
      { id: 3, nombre: "CD PROJEKT RED" },
      { id: 4, nombre: "Supergiant Games" },
      { id: 5, nombre: "Mojang Studios" },
      { id: 6, nombre: "MercurySteam" }
    ];

    // ---------- utilidades de errores ----------
    function limpiarErrores(form) {
      form.querySelectorAll(".error").forEach(function (el) {
        el.classList.remove("error");
      });
      form.querySelectorAll(".msg-error").forEach(function (el) {
        el.remove();
      });
    }

    function ponerError(elemento, mensaje) {
      limpiarErrorDeCampo(elemento);
      elemento.classList.add("error");
      const p = document.createElement("p");
      p.className = "msg-error";
      p.textContent = mensaje;
      elemento.insertAdjacentElement("afterend", p);
    }

    function limpiarErrorDeCampo(elemento) {
      elemento.classList.remove("error");
      const siguiente = elemento.nextElementSibling;
      if (siguiente && siguiente.classList.contains("msg-error")) {
        siguiente.remove();
      }
    }

    // ---------- sanitizado + maxlength ----------
    function clampMaxLen(str, maxLen) {
      if (typeof str !== "string") return "";
      if (!maxLen || maxLen <= 0) return str;
      return str.length > maxLen ? str.slice(0, maxLen) : str;
    }

    function sanitizeNombreLike(s) {
      // letras (incl acentos), espacios, apóstrofe y guion
      return s.replace(/[^A-Za-zÁÉÍÓÚÜÑáéíóúüñ\s'\-]/g, "");
    }

    function sanitizeEmail(s) {
      // sin espacios, en minúsculas
      return s.replace(/\s+/g, "").toLowerCase();
    }

    function bindSanitizer(el, sanitizerFn) {
      el.addEventListener("input", function () {
        limpiarErrorDeCampo(el);
        const max = el.maxLength;
        const cleaned = clampMaxLen(sanitizerFn(el.value), max);
        if (el.value !== cleaned) el.value = cleaned;
      });
    }

    bindSanitizer(nombre, sanitizeNombreLike);
    bindSanitizer(apellido, sanitizeNombreLike);
    bindSanitizer(ciudad, sanitizeNombreLike);
    bindSanitizer(pais, sanitizeNombreLike);
    bindSanitizer(email, sanitizeEmail);

    // ---------- estudios: select con "Sin estudio" => null ----------
    function fillEstudios() {
      selectEstudio.innerHTML = "";

      const optNull = document.createElement("option");
      optNull.value = ""; // luego => null
      optNull.textContent = "Sin estudio";
      selectEstudio.appendChild(optNull);

      estudiosActuales.forEach(function (e) {
        const opt = document.createElement("option");
        opt.value = String(e.id);
        opt.textContent = e.nombre;
        selectEstudio.appendChild(opt);
      });
    }
    fillEstudios();

    // Mostrar/ocultar id_estudio según Activo
    function refreshEstudioVisibility() {
      if (activo.checked) {
        wrapEstudio.style.display = "block";
      } else {
        wrapEstudio.style.display = "none";
        selectEstudio.value = ""; // por defecto => null
        limpiarErrorDeCampo(selectEstudio);
      }
    }
    activo.addEventListener("change", function () {
      refreshEstudioVisibility();
      limpiarErrorDeCampo(activo);
    });
    refreshEstudioVisibility();

    // ---------- validaciones ----------
    function isValidEmail(v) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    }

    function validatePersonal() {
      limpiarErrores(formPersonal);

      let ok = true;
      let primerError = null;

      if (nombre.value.trim() === "") {
        ponerError(nombre, "El nombre es obligatorio.");
        if (!primerError) primerError = nombre;
        ok = false;
      }

      if (apellido.value.trim() === "") {
        ponerError(apellido, "El apellido es obligatorio.");
        if (!primerError) primerError = apellido;
        ok = false;
      }

      // email opcional, pero si está, debe ser válido
      if (email.value.trim() !== "" && !isValidEmail(email.value.trim())) {
        ponerError(email, "El email no tiene un formato válido.");
        if (!primerError) primerError = email;
        ok = false;
      }

      if (!ok && primerError) primerError.focus();
      return ok;
    }

    function validateLaboral() {
      limpiarErrores(formLaboral);

      let ok = true;
      let primerError = null;

      if (fechaAlta.value === "") {
        ponerError(fechaAlta, "La fecha de alta es obligatoria.");
        if (!primerError) primerError = fechaAlta;
        ok = false;
      }

      // id_estudio solo visible si activo, y "Sin estudio" es válido (null)
      // Si quisieras obligar a escoger uno real cuando está activo, valida aquí.

      if (!ok && primerError) primerError.focus();
      return ok;
    }

    function getPersonalData() {
      const data = {
        nombre: nombre.value.trim(),
        apellido: apellido.value.trim(),
        email: email.value.trim(),
        ciudad: ciudad.value.trim(),
        pais: pais.value.trim(),
        fecha_nacimiento: fechaNacimiento.value || null
      };

      // vacíos => null (para BD)
      Object.keys(data).forEach(function (k) {
        if (data[k] === "") data[k] = null;
      });

      return data;
    }

    function getLaboralData() {
      const isActivo = activo.checked;

      let id_estudio = null;
      if (isActivo) {
        const v = selectEstudio.value;
        id_estudio = (v === "") ? null : Number(v);
      } else {
        id_estudio = null;
      }

      return {
        fecha_alta: fechaAlta.value || null,
        activo: isActivo,
        id_estudio: id_estudio
      };
    }

    function escapeHtml(s) {
      return s
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // ---------- eventos ----------
    // limpiar error al corregir
    nombre.addEventListener("input", function () { limpiarErrorDeCampo(nombre); });
    apellido.addEventListener("input", function () { limpiarErrorDeCampo(apellido); });
    email.addEventListener("input", function () { limpiarErrorDeCampo(email); });
    ciudad.addEventListener("input", function () { limpiarErrorDeCampo(ciudad); });
    pais.addEventListener("input", function () { limpiarErrorDeCampo(pais); });
    fechaNacimiento.addEventListener("change", function () { limpiarErrorDeCampo(fechaNacimiento); });

    fechaAlta.addEventListener("change", function () { limpiarErrorDeCampo(fechaAlta); });
    selectEstudio.addEventListener("change", function () { limpiarErrorDeCampo(selectEstudio); });

    // Submit personal
    formPersonal.addEventListener("submit", function (e) {
      e.preventDefault();
      resumen.innerHTML = "";

      const ok = validatePersonal();
      if (ok) {
        const data = getPersonalData();
        resumen.innerHTML =
          "<strong>Personal válido</strong><br>" +
          "<pre>" + escapeHtml(JSON.stringify(data, null, 2)) + "</pre>";
      }
    });

    // Submit laboral (guarda personal + laboral)
    formLaboral.addEventListener("submit", function (e) {
      e.preventDefault();
      resumen.innerHTML = "";

      const okP = validatePersonal();
      const okL = validateLaboral();
      if (!okP || !okL) return;

      const payload = Object.assign({}, getPersonalData(), getLaboralData());

      resumen.innerHTML =
        "<strong>Formulario válido (simulación de guardado)</strong><br>" +
        "<pre>" + escapeHtml(JSON.stringify(payload, null, 2)) + "</pre>" +
        "<div style='margin-top:6px; font-size:13px;'>Nota: <code>id_estudio</code> será <code>null</code> si eliges “Sin estudio” o si <code>activo</code> es <code>false</code>.</div>";
    });

    // Reset personal
    formPersonal.addEventListener("reset", function () {
      setTimeout(function () {
        limpiarErrores(formPersonal);
        resumen.innerHTML = "";
        nombre.focus();
      }, 0);
    });

    // Reset laboral
    formLaboral.addEventListener("reset", function () {
      setTimeout(function () {
        limpiarErrores(formLaboral);
        resumen.innerHTML = "";
        activo.checked = false;
        refreshEstudioVisibility();
        fechaAlta.focus();
      }, 0);
    });

    // foco inicial
    window.addEventListener("load", function () {
      nombre.focus();
    });
  </script>
</body>
</html>
