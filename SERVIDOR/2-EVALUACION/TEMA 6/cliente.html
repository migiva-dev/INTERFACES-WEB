<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD simple en PHP</title>
<style>
  body { font-family: Arial, sans-serif; max-width: 900px; margin: 20px auto; }
  .error { color: #b00020; }
  .ok { color: #0a7a2f; }
  table { width:100%; border-collapse: collapse; margin-top: 10px; }
  th, td { border: 1px solid #e3e3e3; padding: 8px; text-align: left; vertical-align: top; }
  th { background: #fafafa; }
</style>
</head>
<body>

<h2>CRUD - Tabla videojuego</h2>

<p id="mensaje"></p>

<form method="POST" id="formCrud">

    <label>ID:</label><br>
    <input type="number" name="id" id="id"><br><br>

    <label>Título:</label><br>
    <input type="text" name="titulo" id="titulo"><br><br>

    
    <label>Fecha de Lanzamiento</label><br>
    <input type="date" name="fecha_lanzamiento" id="fecha_lanzamiento"><br><br>

    <label>Pegi</label><br>
    
    <input type="number" name="pegi" id="pegi" min="0" max="21" placeholder="Ej: 3, 7, 12, 16, 18"><br><br>

    <label>Precio:</label><br>
    <input type="number" step="0.01" name="precio" id="precio"><br><br>

    <label>Motor:</label><br>
    <select name="motor" id="motor">
      <option value="">--Selecciona un motor--</option>
      <option value="Unreal Engine">Unreal Engine</option>
      <option value="Unity">Unity</option>
      <option value="Godot">Godot</option>
      <option value="CryEngine">CryEngine</option>
      <option value="Frostbite">Frostbite</option>
    </select><br><br>

    <label>Multijugador</label><br>
    
    <input type="checkbox" id="multijugador"><br><br>

    <label>ID Estudio:</label><br>
    <input type="number" name="id_estudio" id="id_estudio"><br><br>

    <label>Descripción</label><br>
    <textarea name="descripcion" id="descripcion" rows="4" cols="50"></textarea><br><br>

    <button type="submit" name="accion" value="add" id="btnAdd">Añadir</button>
    <button type="submit" name="accion" value="update" id="btnUpdate">Actualizar</button>
    <button type="submit" name="accion" value="delete" id="btnDelete">Eliminar</button>

</form>

<hr>

<h3> Mostrar </h3>
<button id="btnReadAll" type="button">Mostrar toda la tabla</button>
<button id="btnReadId" type="button">Mostrar fila por ID (usa el campo ID)</button>
<button id="btnReadTitle" type="button">Mostrar fila por Título (usa el campo Título)</button>

<table id="tabla" style="display:none">
  <thead>
    <tr>
      <th>ID</th>
      <th>Título</th>
      <th>Fecha</th>
      <th>PEGI</th>
      <th>Precio</th>
      <th>Motor</th>
      <th>Multi</th>
      <th>ID Estudio</th>
      <th>Descripción</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
  const URL = "servidor.php";

  const form = document.getElementById("formCrud");
  const mensaje = document.getElementById("mensaje");

  const tabla = document.getElementById("tabla");
  const tbody = document.getElementById("tbody");

  function setMensaje(txt, ok=true){
    mensaje.className = ok ? "ok" : "error";
    mensaje.textContent = txt;
  }

  function esc(v){
    return (v === null || v === undefined) ? "" : String(v);
  }

  function pintarTabla(filas){
    tbody.innerHTML = "";

    if (!Array.isArray(filas) || filas.length === 0){
      tabla.style.display = "none";
      return;
    }

    filas.forEach(f => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${esc(f.id_videojuego)}</td>
        <td>${esc(f.titulo)}</td>
        <td>${esc(f.fecha_lanzamiento)}</td>
        <td>${esc(f.pegi)}</td>
        <td>${esc(f.precio_base)}</td>
        <td>${esc(f.motor)}</td>
        <td>${esc(f.es_multijugador)}</td>
        <td>${esc(f.id_estudio)}</td>
        <td>${esc(f.descripcion)}</td>
      `;
      tbody.appendChild(tr);
    });

    tabla.style.display = "";
  }

  async function postForm(formData){
    const resp = await fetch(URL, { method: "POST", body: formData });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data?.error || "Error del servidor");
    return data;
  }

  function buildFormData(accion){
    const fd = new FormData(form);
    fd.set("accion", accion);

    // Convertir checkbox a 0/1 con el nombre que espera el servidor
    const multi = document.getElementById("multijugador").checked ? "1" : "0";
    fd.set("es_multijugador", multi);

    // Aseguramos fecha_lanzamiento 
    const fecha = document.getElementById("fecha_lanzamiento").value;
    fd.set("fecha_lanzamiento", fecha);

    return fd;
  }

  // ===== add/update/delete =====
  ["btnAdd","btnUpdate","btnDelete"].forEach(idBtn => {
    document.getElementById(idBtn).addEventListener("click", async (e) => {
      e.preventDefault();

      const accion = e.target.value; // add/update/delete
      const fd = buildFormData(accion);

      setMensaje("Procesando...", true);
      pintarTabla([]);

      try {
        const data = await postForm(fd);

        if (accion === "add") setMensaje("Videojuego añadido correctamente.", true);
        if (accion === "update") setMensaje("Videojuego actualizado.", true);
        if (accion === "delete") setMensaje("Videojuego eliminado.", true);

        // Mostrar SOLO la fila devuelta
        if (data.fila) pintarTabla([data.fila]);
      } catch (err) {
        setMensaje(String(err), false);
        pintarTabla([]);
      }
    });
  });

  // ===== read_all =====
  document.getElementById("btnReadAll").addEventListener("click", async () => {
    const fd = new FormData();
    fd.set("accion", "read_all");

    setMensaje("Leyendo tabla...", true);
    pintarTabla([]);

    try {
      const data = await postForm(fd);
      pintarTabla(data.filas);
      setMensaje(`Mostrando ${data.total} videojuego(s).`, true);
    } catch (err) {
      setMensaje(String(err), false);
      pintarTabla([]);
    }
  });

  // ===== read_id =====
  document.getElementById("btnReadId").addEventListener("click", async () => {
    const id = document.getElementById("id").value;

    const fd = new FormData();
    fd.set("accion", "read_id");
    fd.set("id", id);

    setMensaje("Buscando por ID...", true);
    pintarTabla([]);

    try {
      const data = await postForm(fd);
      pintarTabla([data.fila]);
      setMensaje("Fila encontrada por ID.", true);
    } catch (err) {
      setMensaje(String(err), false);
      pintarTabla([]);
    }
  });

  // ===== read_title =====
  document.getElementById("btnReadTitle").addEventListener("click", async () => {
    const titulo = document.getElementById("titulo").value;

    const fd = new FormData();
    fd.set("accion", "read_title");
    fd.set("titulo", titulo);

    setMensaje("Buscando por título...", true);
    pintarTabla([]);

    try {
      const data = await postForm(fd);
      pintarTabla([data.fila]);
      setMensaje("Fila encontrada por título.", true);
    } catch (err) {
      setMensaje(String(err), false);
      pintarTabla([]);
    }
  });
</script>

</body>
</html>
