<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CRUD Videojuegos</title>

<style>
/* ===== RESET ===== */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Segoe UI', Roboto, sans-serif;
}

body {
  background: linear-gradient(135deg, #1f2937, #111827);
  color: #f9fafb;
  padding: 40px 20px;
}

/* ===== CONTENEDOR PRINCIPAL ===== */
body > * {
  max-width: 1100px;
  margin: auto;
}

/* ===== TÍTULO ===== */
h2 {
  text-align: center;
  margin-bottom: 25px;
  font-size: 28px;
  letter-spacing: 1px;
  color: #60a5fa;
}

/* ===== SEPARADORES ===== */
hr {
  border: none;
  height: 1px;
  background: #374151;
  margin: 25px 0;
}

/* ===== MENSAJES ===== */
#mensaje {
  padding: 12px 15px;
  border-radius: 8px;
  margin-bottom: 20px;
  font-weight: 500;
  min-height: 22px;
}

.ok {
  background: rgba(16, 185, 129, 0.15);
  color: #34d399;
  border: 1px solid #10b981;
}

.error {
  background: rgba(239, 68, 68, 0.15);
  color: #f87171;
  border: 1px solid #ef4444;
}

/* ===== FORMULARIO ===== */
form {
  background: #1f2937;
  padding: 25px;
  border-radius: 14px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  margin-bottom: 10px;
}

label {
  font-size: 14px;
  font-weight: 600;
  color: #93c5fd;
  display: inline-block;
  margin-bottom: 6px;
}

input, select, textarea {
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 1px solid #374151;
  background: #111827;
  color: #f9fafb;
  transition: 0.3s;
  margin-bottom: 14px;
}

input:focus, select:focus, textarea:focus {
  border-color: #3b82f6;
  outline: none;
  box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
}

textarea {
  resize: vertical;
  min-height: 90px;
}

/* ===== BOTONES ===== */
button {
  padding: 10px 18px;
  margin-right: 10px;
  margin-top: 6px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 700;
  transition: 0.2s ease;
}

button:active {
  transform: translateY(1px);
}

#btnAdd {
  background: #10b981;
  color: white;
}
#btnAdd:hover {
  background: #059669;
  transform: translateY(-2px);
}

#btnUpdate {
  background: #3b82f6;
  color: white;
}
#btnUpdate:hover {
  background: #2563eb;
  transform: translateY(-2px);
}

#btnDelete {
  background: #ef4444;
  color: white;
}
#btnDelete:hover {
  background: #dc2626;
  transform: translateY(-2px);
}

/* Botones de mostrar */
#btnReadAll,
#btnReadId,
#btnReadTitle {
  background: #6366f1;
  color: white;
}
#btnReadAll:hover,
#btnReadId:hover,
#btnReadTitle:hover {
  background: #4f46e5;
  transform: translateY(-2px);
}

/* ===== TABLA ===== */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
  background: #1f2937;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
}

th {
  background: #374151;
  color: #93c5fd;
  padding: 12px;
  text-align: left;
  font-size: 14px;
}

td {
  padding: 12px;
  border-bottom: 1px solid #374151;
  font-size: 14px;
  vertical-align: top;
}

tr:hover {
  background: rgba(59, 130, 246, 0.08);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 900px) {
  table { display:block; overflow-x:auto; }
}
</style>

</head>
<body>

<h2>CRUD - Tabla videojuego</h2>
<p id="mensaje"></p>

<form id="formCrud">

  <label>ID:</label>
  <input type="number" name="id" id="id" placeholder="Para actualizar/borrar/mostrar por ID">

  <label>Título:</label>
  <input type="text" name="titulo" id="titulo" placeholder="Ej: The Witcher 3">

  <label>Fecha de Lanzamiento:</label>
  <input type="date" name="fecha_lanzamiento" id="fecha_lanzamiento">

  <label>PEGI:</label>
  <input type="number" name="pegi" id="pegi" min="0" max="21" placeholder="Ej: 18">

  <label>Precio:</label>
  <input type="number" step="0.01" name="precio" id="precio" placeholder="Ej: 59.99">

  <label>Motor:</label>
  <input type="text" name="motor" id="motor" placeholder="Ej: Unreal Engine">

  <label>Multijugador:</label>
  <select id="multijugador">
    <option value="0">No</option>
    <option value="1">Sí</option>
  </select>

  <label>Descripción:</label>
  <textarea name="descripcion" id="descripcion" placeholder="Descripción del juego..."></textarea>

  <button id="btnAdd" type="button">Añadir</button>
  <button id="btnUpdate" type="button">Actualizar</button>
  <button id="btnDelete" type="button">Eliminar</button>
</form>

<hr>

<h3 style="color:#93c5fd;margin-bottom:10px;">Mostrar</h3>
<button id="btnReadAll" type="button">Mostrar toda la tabla</button>
<button id="btnReadId" type="button">Mostrar fila por ID</button>
<button id="btnReadTitle" type="button">Mostrar fila por Título</button>

<table id="tabla" style="display:none">
  <thead>
    <tr>
      <th>ID</th>
      <th>Título</th>
      <th>Fecha</th>
      <th>PEGI</th>
      <th>Precio</th>
      <th>Motor</th>
      <th>Multijugador</th>
      <th>Descripción</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const URL = "servidor.php";

const form = document.getElementById("formCrud");
const mensaje = document.getElementById("mensaje");
const tabla = document.getElementById("tabla");
const tbody = document.getElementById("tbody");

function setMensaje(txt, ok=true){
  mensaje.className = ok ? "ok" : "error";
  mensaje.textContent = txt;
}

function esc(v){ return (v === null || v === undefined) ? "" : String(v); }
function multiTxt(v){ return String(v) === "1" ? "Sí" : "No"; }

function pintarTabla(filas){
  tbody.innerHTML = "";
  if (!Array.isArray(filas) || filas.length === 0) { tabla.style.display = "none"; return; }

  filas.forEach(f => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${esc(f.id_videojuego)}</td>
      <td>${esc(f.titulo)}</td>
      <td>${esc(f.fecha_lanzamiento)}</td>
      <td>${esc(f.pegi)}</td>
      <td>${esc(f.precio_base)}</td>
      <td>${esc(f.motor)}</td>
      <td>${multiTxt(f.es_multijugador)}</td>
      <td>${esc(f.descripcion)}</td>
    `;
    tbody.appendChild(tr);
  });

  tabla.style.display = "";
}

async function postFD(fd){
  const resp = await fetch(URL, { method:"POST", body: fd });
  const data = await resp.json().catch(()=> ({}));
  if (!resp.ok) throw new Error(data?.error || "Error servidor");
  return data;
}

function buildFD(accion){
  const fd = new FormData(form);
  fd.set("accion", accion);
  // multijugador: enviamos 0/1 aunque el usuario vea Sí/No
  fd.set("es_multijugador", document.getElementById("multijugador").value);
  return fd;
}

// ADD
document.getElementById("btnAdd").addEventListener("click", async () => {
  try {
    setMensaje("Añadiendo...", true);
    const data = await postFD(buildFD("add"));
    setMensaje("Añadido OK (mostrando fila añadida)", true);
    pintarTabla([data.fila]);
  } catch(e) { setMensaje(String(e), false); }
});

// UPDATE
document.getElementById("btnUpdate").addEventListener("click", async () => {
  try {
    setMensaje("Actualizando...", true);
    const data = await postFD(buildFD("update"));
    setMensaje("Actualizado OK (mostrando fila actualizada)", true);
    pintarTabla([data.fila]);
  } catch(e) { setMensaje(String(e), false); }
});

// DELETE
document.getElementById("btnDelete").addEventListener("click", async () => {
  const id = document.getElementById("id").value;
  if (!id) return setMensaje("Pon un ID para borrar", false);

  const fd = new FormData();
  fd.set("accion", "delete");
  fd.set("id", id);

  try {
    setMensaje("Borrando...", true);
    const data = await postFD(fd);
    setMensaje("Borrado OK (mostrando fila borrada)", true);
    pintarTabla([data.fila]);
  } catch(e) { setMensaje(String(e), false); }
});

// READ ALL
document.getElementById("btnReadAll").addEventListener("click", async () => {
  const fd = new FormData();
  fd.set("accion", "read_all");
  try {
    setMensaje("Cargando tabla...", true);
    const data = await postFD(fd);
    setMensaje(`Mostrando ${data.total} videojuego(s)`, true);
    pintarTabla(data.filas);
  } catch(e) { setMensaje(String(e), false); }
});

// READ ID
document.getElementById("btnReadId").addEventListener("click", async () => {
  const id = document.getElementById("id").value;
  const fd = new FormData();
  fd.set("accion", "read_id");
  fd.set("id", id);

  try {
    setMensaje("Buscando por ID...", true);
    const data = await postFD(fd);
    setMensaje("Fila encontrada por ID", true);
    pintarTabla([data.fila]);
  } catch(e) { setMensaje(String(e), false); }
});

// READ TITLE
document.getElementById("btnReadTitle").addEventListener("click", async () => {
  const titulo = document.getElementById("titulo").value;
  const fd = new FormData();
  fd.set("accion", "read_title");
  fd.set("titulo", titulo);

  try {
    setMensaje("Buscando por título...", true);
    const data = await postFD(fd);
    setMensaje("Fila encontrada por título", true);
    pintarTabla([data.fila]);
  } catch(e) { setMensaje(String(e), false); }
});
</script>

</body>
</html>
