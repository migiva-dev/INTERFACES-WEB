<script>
    // =====================================================
    // DIRECCIONES DEL CONTROLADOR
    // =====================================================
    const URL_CARTELERA = "controlador.php/cartelera";
    const URL_ENTRADAS = "controlador.php/entradas";
    const URL_RESERVAS = "controlador.php/reservas";

    // =====================================================
    // SERVICIO 1: CARTELERA HTML
    // =====================================================
    const formCartelera = document.getElementById("formCartelera");
    const selectGenero = document.getElementById("genero");
    const zonaCartelera = document.getElementById("zonaCartelera");

    formCartelera.addEventListener("submit", async function(event) {
        event.preventDefault();

        await cargarCartelera();
    });

    async function cargarCartelera() {
        zonaCartelera.innerHTML =
            '<p class="cargando">Cargando cartelera...</p>';

        try {
            // TODO 3:
            // Construir la URL necesaria para consultar la cartelera.
            // Crear un objeto URLSearchParams e incluir el género seleccionado
            // en el formulario. Después, añadir esos parámetros a URL_CARTELERA.
            const parametros = new URLSearchParams();
            parametros.append("genero", selectGenero.value);

            const url = URL_CARTELERA + "?" + parametros.toString();

            // TODO 4:
            // Realizar una petición GET al controlador para obtener la cartelera.
            // La respuesta recibida será un fragmento HTML, por lo que debe
            // leerse como texto e insertarse directamente dentro de zonaCartelera.
            const respuesta = await fetch(url, {
                method: "GET"
            });

            const html = await respuesta.text();

            if (!respuesta.ok) {
                throw new Error("Error HTTP: " + respuesta.status);
            }

            zonaCartelera.innerHTML = html;

        } catch (error) {
            zonaCartelera.innerHTML =
                '<p class="error">Error al cargar la cartelera.</p>';

            console.log(error);
        }
    }

    // =====================================================
    // SERVICIO 2: SOAP
    // =====================================================
    const formEntradas = document.getElementById("formEntradas");
    const inputCantidad = document.getElementById("cantidad");
    const selectTipoEntrada = document.getElementById("tipoEntrada");
    const resultadoEntradas = document.getElementById("resultadoEntradas");

    formEntradas.addEventListener("submit", async function(event) {
        event.preventDefault();

        await calcularPrecioEntradas();
    });

    async function calcularPrecioEntradas() {
        const cantidad = inputCantidad.value;
        const tipo = selectTipoEntrada.value;

        resultadoEntradas.className = "cargando";
        resultadoEntradas.textContent = "Calculando precio...";

        // TODO 5:
        // Consultar el documento WSDL incluido en la carpeta documentacion
        // y construir la petición XML SOAP correspondiente.
        // La petición debe contener el Envelope, el Body, la operación
        // definida en el WSDL y los datos introducidos en el formulario.
        
        // const xmlSoap 
        const xmlSoap = `<?xml version="1.0" encoding="UTF-8"?>
        <soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:cin="http://localhost/SERVIDOR/EXAMEN%203%20EV/servicio_entradas.php">
            <soapenv:Header/>
            <soapenv:Body>
                <cin:calcularPrecioEntradas>
                    <cin:cantidad>${cantidad}</cin:cantidad>
                    <cin:tipo>${tipo}</cin:tipo>
                </cin:calcularPrecioEntradas>
            </soapenv:Body>
        </soapenv:Envelope>`;

        try {
            // TODO 6:
            // Enviar la petición SOAP al controlador mediante fetch().
            // Utilizar POST, indicar que se envía y se espera recibir XML
            // y enviar la cadena XML creada anteriormente en el body.
            // Recoger la respuesta recibida como texto.
            
            // const respuesta 
            const respuesta = await fetch(URL_ENTRADAS, {
                method: "POST",
                headers: {
                    "Content-Type": "text/xml; charset=utf-8",
                    "Accept": "text/xml"
                },
                body: xmlSoap
            });

            const respuestaXml = await respuesta.text();

            if (!respuesta.ok) {
                throw new Error("Error HTTP: " + respuesta.status);
            }

            // TODO 7:
            // Interpretar la respuesta SOAP.
            // Convertir el texto XML recibido en un documento XML.
            // Consultar el WSDL para recuperar los datos
            // del precio total y unitario (ESTAN ABAJO)
            
            // const parser
            // const xml
            const parser = new DOMParser();
            const xml = parser.parseFromString(respuestaXml, "text/xml");

            const nodoErrorXml =
                xml.getElementsByTagName("parsererror")[0];

            if (nodoErrorXml) {
                throw new Error(
                    "El servidor no ha devuelto un XML válido."
                );
            }

            const nodoFault = obtenerPrimerNodo(
                xml,
                "faultstring"
            );

            if (nodoFault) {
                resultadoEntradas.className = "error";
                resultadoEntradas.textContent =
                    "Error SOAP: " + nodoFault.textContent;

                return;
            }

            // const nodoPrecioTotal
            const nodoPrecioTotal = obtenerPrimerNodo(
                xml,
                "precioTotal"
            );

            // const nodoPrecioUnitario
            const nodoPrecioUnitario = obtenerPrimerNodo(
                xml,
                "precioUnitario"
            );

            if (!nodoPrecioTotal || !nodoPrecioUnitario) {
                throw new Error(
                    "La respuesta SOAP no contiene el resultado esperado."
                );
            }

            resultadoEntradas.className = "ok";

            resultadoEntradas.textContent =
                "Precio unitario: " + nodoPrecioUnitario.textContent +
                " € | Precio total: " + nodoPrecioTotal.textContent + " €";

        } catch (error) {
            resultadoEntradas.className = "error";
            resultadoEntradas.textContent =
                "No se pudo calcular el precio de las entradas.";

            console.log(error);
        }
    }

    function obtenerPrimerNodo(xml, nombre) {
        const nodosConNamespace =
            xml.getElementsByTagNameNS("*", nombre);

        if (nodosConNamespace.length > 0) {
            return nodosConNamespace[0];
        }

        return xml.getElementsByTagName(nombre)[0];
    }

    // =====================================================
    // SERVICIO 3: REST A TRAVÉS DE CURL
    // =====================================================
    const btnCargarReservas = document.getElementById("btnCargarReservas");
    const formReserva = document.getElementById("formReserva");
    const mensajeReservas = document.getElementById("mensajeReservas");
    const zonaReservas = document.getElementById("zonaReservas");

    btnCargarReservas.addEventListener("click", async function() {
        await cargarReservas();
    });

    formReserva.addEventListener("submit", async function(event) {
        event.preventDefault();

        await crearReserva();
    });

    async function cargarReservas(
        mensajeFinal = "Reservas consultadas correctamente."
    ) {
        mensajeReservas.className = "cargando";
        mensajeReservas.textContent = "Consultando reservas...";

        zonaReservas.innerHTML = "";

        try {
            // TODO 11:
            // Consultar las reservas utilizando la operación GET documentada
            // en la especificación OpenAPI.
            // La petición debe realizarse a URL_RESERVAS e indicar que
            // se espera recibir una respuesta JSON.
            
            // const respuesta
            const respuesta = await fetch(URL_RESERVAS, {
                method: "GET",
                headers: {
                    "Accept": "application/json"
                }
            });

            // TODO 12:
            // Recoger la respuesta JSON obtenida en la consulta.
            // Si la respuesta HTTP no es correcta, lanzar un error (viene en el json).
            // Si es correcta, mostrar las reservas recibidas utilizando mostrarReservas().
            
            //const datos = await leerRespuestaJson(respuesta);
            const datos = await leerRespuestaJson(respuesta);

            if (!respuesta.ok) {
                throw new Error(datos.error || "Error HTTP: " + respuesta.status);
            }

            if (Array.isArray(datos)) {
                mostrarReservas(datos);

            } else if (Array.isArray(datos.reservas)) {
                mostrarReservas(datos.reservas);

            } else {
                throw new Error("La respuesta no contiene una lista de reservas.");
            }

            mensajeReservas.className = "ok";
            mensajeReservas.textContent = mensajeFinal;

        } catch (error) {
            mensajeReservas.className = "error";
            mensajeReservas.textContent =
                "No se pudieron consultar las reservas. " +
                error.message;

            console.log(error);
        }
    }

    async function crearReserva() {
        // TODO 13:
        // Consultar la especificación OpenAPI y crear el objeto JavaScript
        // correspondiente al cuerpo de una nueva reserva.
        // Los valores deben obtenerse de los campos del formulario.
        
        // const body
        const body = {
            cliente: document.getElementById("clienteReserva").value.trim(),
            pelicula: document.getElementById("peliculaReserva").value.trim(),
            entradas: Number(document.getElementById("entradasReserva").value)
        };

        if (body.cliente === "" || body.pelicula === "" || body.entradas < 1) {
            mensajeReservas.className = "error";
            mensajeReservas.textContent =
                "Debes introducir cliente, película y al menos una entrada.";

            return;
        }

        mensajeReservas.className = "cargando";
        mensajeReservas.textContent = "Creando reserva...";

        try {
            // TODO 14:
            // Crear la nueva reserva utilizando la operación POST documentada
            // en OpenAPI.
            // Enviar el objeto anterior convertido a JSON, incluyendo las
            // cabeceras necesarias. Recoger la respuesta JSON y comprobar si la operación es correcta.
            
            // const respuesta
            const respuesta = await fetch(URL_RESERVAS, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json; charset=utf-8",
                    "Accept": "application/json"
                },
                body: JSON.stringify(body)
            });

            // const datos
            const datos = await leerRespuestaJson(respuesta);

            if (!respuesta.ok) {
                throw new Error(datos.error || "Error HTTP: " + respuesta.status);
            }

            formReserva.reset();

            document.getElementById("entradasReserva").value = 1;

            await cargarReservas(datos.mensaje || "Reserva creada correctamente.");

        } catch (error) {
            mensajeReservas.className = "error";
            mensajeReservas.textContent =
                "No se pudo crear la reserva. " +
                error.message;

            console.log(error);
        }
    }

    async function leerRespuestaJson(respuesta) {
        const texto = await respuesta.text();

        try {
            return JSON.parse(texto);

        } catch (error) {
            throw new Error(
                "El servidor no ha devuelto una respuesta JSON válida."
            );
        }
    }

    function mostrarReservas(reservas) {
        zonaReservas.innerHTML = "";

        if (reservas.length === 0) {
            zonaReservas.innerHTML =
                '<p class="mensaje">No hay reservas registradas.</p>';

            return;
        }

        reservas.forEach(function(reserva) {
            const articulo = document.createElement("article");
            articulo.className = "reserva";

            const titulo = document.createElement("h3");
            titulo.textContent = "Reserva " + reserva.id;

            const cliente = document.createElement("p");
            cliente.textContent = "Cliente: " + reserva.cliente;

            const pelicula = document.createElement("p");
            pelicula.textContent = "Película: " + reserva.pelicula;

            const entradas = document.createElement("p");
            entradas.textContent = "Entradas: " + reserva.entradas;

            articulo.appendChild(titulo);
            articulo.appendChild(cliente);
            articulo.appendChild(pelicula);
            articulo.appendChild(entradas);

            zonaReservas.appendChild(articulo);
        });
    }
</script>
